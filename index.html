<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Climb-or-Fall | Ultimate Rage Platformer</title>
    <link rel="icon" type="image/svg+xml" href="./logo.svg">
    <link rel="manifest" href="./manifest.json">

    <meta name="google-adsense-account" content="ca-pub-5820888942116492">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5820888942116492"
        crossorigin="anonymous"></script>
    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Climb-or-Fall: The ultimate high-intensity 2D physics rage platformer. Challenge yourself in this infinite tower climber. Unlock exclusive skins, complete the battle pass, and climb to glory. Perfect for fans of challenging skill games!">
    <meta name="keywords"
        content="Climb-or-Fall, rage game, hard platformer, 2D physics game, infinite climber, tower climb game, skill based game, addictive platformer, challenge platformer, doodle jump style, infinite runner, mobile rage game, Ravi Dandaiya, Ravi Dandaiya Games, competitive platformer">
    <meta name="author" content="Ravi Dandaiya">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ravidandaiya.github.io/Climb-or-Fall-/">
    <meta property="og:title" content="Climb-or-Fall | Ultimate Rage Platformer">
    <meta property="og:description"
        content="Test your skill in the ultimate climbing challenge. Unlock exclusive skins and battle pass rewards.">
    <meta property="og:image" content="https://ravidandaiya.github.io/Climb-or-Fall-/logo.svg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://ravidandaiya.github.io/Climb-or-Fall-/">
    <meta property="twitter:title" content="Climb-or-Fall | Ultimate Rage Platformer">
    <meta property="twitter:description"
        content="Test your skill in the ultimate climbing challenge. Unlock exclusive skins and battle pass rewards.">
    <meta property="twitter:image" content="https://ravidandaiya.github.io/Climb-or-Fall-/logo.svg">

    <link rel="canonical" href="https://ravidandaiya.github.io/Climb-or-Fall-/">

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "name": "Climb-or-Fall",
      "description": "A high-intensity 2D physics rage platformer where players scale an infinite tower while unlocking skins and completing a battle pass.",
      "genre": [
        "Platformer",
        "Rage Game",
        "Physics Game"
      ],
      "url": "https://ravidandaiya.github.io/Climb-or-Fall-/",
      "image": "https://ravidandaiya.github.io/Climb-or-Fall-/logo.svg",
      "author": {
        "@type": "Person",
        "name": "Ravi Dandaiya"
      },
      "operatingSystem": "Web Browser",
      "applicationCategory": "Game"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800;900&family=Creepster&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./mobile-controls.css">
    <link rel="stylesheet" href="./responsive.css">
    <!-- Removed matter-js CDN script -->
</head>

<body>
    <div id="game-container">
        <!-- Main Game HUD -->
        <div id="ui-overlay">
            <div class="hud-top-left">

                <div class="hud-stats">
                    <div class="stat-card">
                        Score: <span id="height-value">0</span>
                    </div>
                    <div class="stat-card">
                        Best: <span id="best-value">0</span>
                    </div>
                    <div class="stat-card">
                        Combo: x<span id="combo-value">1</span>
                    </div>
                </div>
            </div>
            <div class="hud-top-right">
                <div class="stat-card coin-card">
                    <span class="stat-value">🪙 <span id="coin-count">0</span></span>
                </div>
            </div>
        </div>

        <!-- Mobile Controls (Left/Right/Jump) -->
        <div id="mobile-controls">
            <div class="control-group left">
                <button class="control-btn" id="btn-left">←</button>
                <button class="control-btn" id="btn-right">→</button>
            </div>
            <div class="control-group right">
                <button class="control-btn power-btn" id="btn-power">⚡</button>
                <button class="control-btn" id="btn-jump">↑</button>
            </div>
        </div>

        <!-- Navigation Sidebar -->
        <div id="side-nav">
            <button class="nav-icon" id="btn-shop">👕</button>
            <button class="nav-icon" id="btn-pass">⚔️</button>
        </div>

        <!-- Login Screen REMOVED -->

        <!-- Start Menu -->
        <div id="difficulty-screen" class="screen-overlay">
            <div class="menu-logo-container">
                <img src="./logo.svg" class="game-logo-img" alt="Climb-or-Fall Rage Platformer Game Logo">
                <h1 class="logo-text">CLIMB<br><span>OR FALL</span></h1>
            </div>



            <div class="controls-setup-box" style="margin-bottom: 20px;">
                <span class="setup-label">MODE</span>
                <div class="toggle-container">
                    <button id="mode-climb" class="toggle-btn active">🧗 CLIMB</button>
                    <button id="mode-fall" class="toggle-btn disabled" disabled title="Fall mode is coming soon">🕳️ FALL (Coming Soon)</button>
                </div>
            </div>

            <div class="controls-setup-box">
                <span class="setup-label">CONTROLS</span>
                <div class="toggle-container">
                    <button id="btn-touch-mode" class="toggle-btn active">👆 TOUCH</button>
                    <button id="btn-tilt-mode" class="toggle-btn">📱 TILT</button>
                </div>
            </div>

            <h1 class="horror-title" style="font-size: 3rem; margin-top: 10px;">CHOOSE FATE</h1>
            <div class="menu-buttons">
                <button class="menu-btn easy" data-difficulty="easy">
                    EASY
                    <span class="btn-desc">Steady climb</span>
                </button>
                <button class="menu-btn medium" data-difficulty="medium">
                    NORMAL
                    <span class="btn-desc">Balanced pain</span>
                </button>
                <button class="menu-btn hard" data-difficulty="hard">
                    HARD
                    <span class="btn-desc">Pure agony</span>
                </button>
            </div>
            <div class="legal-links">
                <a href="privacy-policy.html" target="_blank">Privacy Policy</a>
                <span>|</span>
                <a href="terms-conditions.html" target="_blank">Terms & Conditions</a>
            </div>
        </div>

        <!-- Shop Screen -->
        <div id="shop-screen" class="screen-overlay hidden">
            <button class="close-btn">×</button>
            <h1 class="horror-title">SKIN BOUTIQUE</h1>
            <div class="skin-grid" id="skin-container">
                <!-- Skins will be injected here -->
            </div>
        </div>

        <!-- Battle Pass Screen -->
        <div id="pass-screen" class="screen-overlay hidden">
            <button class="close-btn">×</button>
            <h1 class="horror-title">BATTLE PASS</h1>
            <div class="pass-progress-container">
                <div class="pass-bar">
                    <div id="pass-fill"></div>
                </div>
                <p>Level <span id="pass-level">1</span></p>
            </div>
            <div class="pass-rewards" id="pass-rewards-container">
                <!-- Pass items injected here -->
            </div>
        </div>

        <!-- Death Screen -->
        <div id="death-screen" class="screen-overlay hidden">
            <div class="death-card">
                <div class="death-header">
                    <h1 class="modern-death-title">GAME OVER</h1>
                    <p class="death-reason-text" id="death-reason">Skill issue? Don't fall next time.</p>
                </div>

                <div class="death-stats-modern">
                    <div class="death-stat-box">
                        <div class="death-stat-icon">📈</div>
                        <div class="death-stat-content">
                            <div class="death-stat-label">SCORE</div>
                            <div class="death-stat-value" id="fall-distance">0</div>
                        </div>
                    </div>
                    <div class="death-stat-box primary-stat">
                        <div class="death-stat-icon prize-icon">🏆</div>
                        <div class="death-stat-content">
                            <div class="death-stat-label text-gold">BEST SCORE</div>
                            <div class="death-stat-value text-gold" id="best-distance-death">0</div>
                        </div>
                    </div>
                </div>
                
                <div class="death-actions-modern">
                    <button class="modern-btn action-revive" id="ad-revive-btn">
                        <span class="btn-icon">▶</span> <span class="btn-text">REVIVE</span>
                        <div class="btn-glow"></div>
                    </button>
                    <button class="modern-btn action-retry" id="retry-button">
                        <span class="btn-icon">↺</span> <span class="btn-text">RESTART</span>
                    </button>
                    <button class="modern-btn action-home" id="home-button">
                        <span class="btn-icon">🏠</span>
                    </button>
                </div>
            </div>
        </div>



        <canvas id="game-canvas"></canvas>
    </div>
    <!-- Removed CDN link effectively -->
    <script type="module" src="./main.js"></script>
</body>

</html>
